name: Feature request
description: Suggest an idea for Cut the Rope DX
labels: ["enhancement", "feat"]
body:
    - type: checkboxes
      attributes:
          label: Required agreements
          description: Please confirm the following before submitting your feature request. Feature request that do not meet these requirements may be closed.
          options:
              - label: I confirm that I have searched the existing issue(s)
                required: true
              - label: I confirm that I have read the FAQ - https://github.com/yell0wsuit/cuttherope-dx/wiki/Frequently-Asked-Questions
                required: true
              - label: I understand that repeatedly submitting duplicate feature requests may result in being blocked from the repository.
                required: true
    - type: textarea
      id: problem
      attributes:
          label: Problem
          description: Is your feature request related to a problem? Please describe it clearly.
          placeholder: |
              I want to have this feature...
              I find it difficult to...
    - type: textarea
      id: description
      attributes:
          label: Proposed idea / solution
          description: A clear and concise description of what you’d like to see added or changed.
          placeholder: |
              I would like the game to...
      validations:
          required: true
    - type: textarea
      id: alternatives
      attributes:
          label: Alternatives considered
          description: Describe any alternative solutions or features you’ve considered.
          placeholder: |
              I’ve tried...
              I’ve also thought about...
    - type: textarea
      attributes:
          label: Additional info
          description: Add any other context, mockups, or screenshots here.
          placeholder: |
              Screenshots, error messages, or links...
      validations:
          required: false
